name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  simulate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Install Icarus Verilog
      run: sudo apt-get update && sudo apt-get install -y iverilog
      
    - name: Run Simulation
      run: make simulate
